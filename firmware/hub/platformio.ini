; Gaitway hub, XIAO ESP32-C3. Waist I2C + right-thigh UART-RVC + merged command
; stream out + ESP-NOW left node. CSV logging over USB.
[env:hub]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
build_flags =
    -I include
    -I ../common                    ; shared gaitway_packet.h
    -DARDUINO_USB_CDC_ON_BOOT=1     ; route Serial to USB for CSV logging, verify on board
lib_deps =
    adafruit/Adafruit BNO08x
