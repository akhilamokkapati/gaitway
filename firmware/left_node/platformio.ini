; Gaitway left thigh node, XIAO ESP32-C3, BNO085 I2C + ESP-NOW to the hub.
[env:left_node]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
build_flags =
    -I include
    -I ../common          ; shared gaitway_packet.h
    -I ../hub/include      ; reuse angles.h, orientation.h, calibration.h
lib_deps =
    adafruit/Adafruit BNO08x
